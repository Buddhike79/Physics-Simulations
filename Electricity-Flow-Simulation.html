<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electricity Water Analogy Simulation</title>
<style>
body { font-family: Arial, sans-serif; background:#0f172a; color:white; text-align:center; margin:0; }
h2 { margin:10px 0; }
.layout { display:flex; justify-content:center; align-items:flex-start; gap:12px; padding:10px; }
.panel { display:flex; flex-direction:column; align-items:center; }
canvas { background:#020617; border-radius:12px; }
.controls { margin:10px 0; }
label { margin:6px; display:inline-block; }
button { margin-left:6px; padding:6px 10px; cursor:pointer; border:none; border-radius:6px; background:#1f2937; color:#cbd5f5; }
button.active { background:#22c55e; color:#022c22; }
#sim { width:60vw; height:35vh; }
#graph { width:35vw; height:50vh; cursor:crosshair; }
</style>
</head>
<body>
<h2>⚡ Electricity Simulation : Water Analogy</h2>

<div class="layout">
  <div class="panel">
    <canvas id="sim" width="900" height="300"></canvas>
    <div class="controls">
      <label>Voltage <input type="range" id="voltage" min="1" max="10" value="5"></label>
      <label>Resistance <input type="range" id="resistance" min="1" max="10" value="5"></label>
      <label>Load <input type="range" id="load" min="1" max="10" value="5"></label>
      <br>
      <button id="acBtn" onclick="toggleAC()">AC Mode</button>
      <button id="pauseBtn" onclick="togglePause()">Pause</button>
      <button id="physicsBtn" onclick="togglePhysics()">Real Physics Mode</button>
      <button id="pulseBtn" onclick="togglePulses()">Energy Pulses</button>
    </div>
  </div>

  <div class="panel">
    <canvas id="graph" width="500" height="400"></canvas>
  </div>
</div>

<div>
  <p id="info"></p>
</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const gcanvas = document.getElementById('graph');
const gctx = gcanvas.getContext('2d');

let particles = [];
let pulses = [];
let showPulses = false;
let acMode = false;
let paused = false;
let physicsMode = false;
let time = 0;
let history = [];

function setActive(id, state){
  const el = document.getElementById(id);
  if(state) el.classList.add('active'); else el.classList.remove('active');
}

function toggleAC(){ acMode=!acMode; setActive('acBtn',acMode);} 
function togglePause(){ paused=!paused; setActive('pauseBtn',paused);} 
function togglePhysics(){ physicsMode=!physicsMode; setActive('physicsBtn',physicsMode);} 
function togglePulses(){ showPulses=!showPulses; setActive('pulseBtn',showPulses);} 

function createParticle(){ return {x:100+Math.random()*600,y:150}; }
function adjustParticleCount(n){ while(particles.length<n) particles.push(createParticle()); while(particles.length>n) particles.pop(); }
function createPulse(){ return {x:100,y:150,life:1.68,energy:0}; }

function drawPipe(intensity){
ctx.strokeStyle="#38bdf8";
ctx.lineWidth=40;
ctx.lineCap="round";
ctx.beginPath();
ctx.moveTo(100,150);
ctx.lineTo(800,150);
ctx.stroke();
}

function drawWheel(speed){
ctx.save(); ctx.translate(800,150); ctx.rotate(speed);
ctx.fillStyle="#facc15";
for(let i=0;i<8;i++){ ctx.rotate(Math.PI/4); ctx.fillRect(0,0,60,10);} 
ctx.restore();
}

function drawArrow(x1,y1,x2,y2,color){
  const angle = Math.atan2(y2-y1,x2-x1);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-6*Math.cos(angle-Math.PI/6), y2-6*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-6*Math.cos(angle+Math.PI/6), y2-6*Math.sin(angle+Math.PI/6));
  ctx.closePath();
  ctx.fill();
}

function drawPhysics(dir, P){
  ctx.font = "16px Arial";

  // Electric field (opposite to electron flow)
  for(let x=120;x<800;x+=80){
    drawArrow(x,100,x-25*dir,100,"#ef4444");
  }
  ctx.fillStyle="#ef4444";
  ctx.fillText("Electric Field (E)",120,85);

  // Magnetic field
  ctx.strokeStyle="#22c55e";
  for(let x=150;x<800;x+=120){
    ctx.beginPath();
    ctx.ellipse(x,150,15,30,0,0,Math.PI*2);
    ctx.stroke();
  }
  ctx.fillStyle="#22c55e";
  ctx.fillText("Magnetic Field (B)",120,170);

  // Energy flow
  const energyDir = Math.sign(P) || 1;
  for(let x=120;x<800;x+=100){
    drawArrow(x,200,x+30*energyDir,200,"#a78bfa");
  }
  ctx.fillStyle="#a78bfa";
  ctx.fillText("Energy Flow",120,215);
}

function drawGraph(){
  gctx.clearRect(0,0,gcanvas.width,gcanvas.height);

  const left=40, right=480, bottom=360, top=40;
  const height=bottom-top;

  let maxVal=1;
  for(const h of history){
    maxVal=Math.max(maxVal, Math.abs(h[0]), Math.abs(h[1]), Math.abs(h[2]));
  }

  const scale=height/(maxVal*1.2);

  gctx.strokeStyle="#fff";
  gctx.beginPath();
  gctx.moveTo(left,bottom); gctx.lineTo(right,bottom);
  gctx.moveTo(left,bottom); gctx.lineTo(left,top);
  gctx.stroke();

  function plot(color,index){
    gctx.strokeStyle=color;
    gctx.beginPath();
    history.forEach((h,i)=>{
      const x=left+i;
      const y=bottom-h[index]*scale;
      if(i===0) gctx.moveTo(x,y); else gctx.lineTo(x,y);
    });
    gctx.stroke();
  }

  plot("#ef4444",0);
  plot("#22c55e",1);
  plot("#a78bfa",2);
}

function update(){
if(!paused){
const Vslider=+document.getElementById('voltage').value;
const R=+document.getElementById('resistance').value;
const load=+document.getElementById('load').value;

time+=0.05;
const V=acMode?Vslider*Math.sin(time):Vslider;
const I=V/R;
const P=V*I;

history.push([V,I,P]); if(history.length>400) history.shift();

const dir=Math.sign(V)||1;
adjustParticleCount(Math.floor(Math.abs(I)*30));

ctx.clearRect(0,0,canvas.width,canvas.height);

if(showPulses && Math.random()<Math.abs(P)/40){
  const pulse = createPulse();
  pulse.energy = Math.abs(P); // energy carried
  pulses.push(pulse);
}

drawPipe(Math.abs(V)/10);

for(let p of particles){
p.x+=(0.5+Math.abs(I)*0.1)*dir;
if(p.x>800) p.x=100;
if(p.x<100) p.x=800;

ctx.fillStyle="white";
ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2); ctx.fill();
}

// 🔶 draw energy pulses (REAL ENERGY FLOW MODE)
if(showPulses){
  for(let i = pulses.length - 1; i >= 0; i--){
    const pulse = pulses[i];
    const energyDir = Math.sign(P) || 1;

    const speed = 0.5 + pulse.energy/10;
    pulse.x += speed * energyDir;

    pulse.life -= 0.002 + 0.002*(1/(1+pulse.energy));

    const energyScale = Math.min(1, pulse.energy/20);
    const alpha = Math.max(0, pulse.life) * (0.5 + 0.5*energyScale);
    const size = 6 + 16 * energyScale;

    ctx.shadowBlur = 30 * energyScale;
    ctx.shadowColor = "#a78bfa";

    // 🔥 NEW: outside wire if physics mode
    if(physicsMode){
      const offset = 30 + 10*Math.sin(time*2 + i);
      ctx.fillStyle = `rgba(167,139,250,${alpha})`;

      // top field flow
      ctx.beginPath();
      ctx.arc(pulse.x, 150 - offset, size, 0, Math.PI*2);
      ctx.fill();

      // bottom field flow
      ctx.beginPath();
      ctx.arc(pulse.x, 150 + offset, size, 0, Math.PI*2);
      ctx.fill();
    } else {
      // normal (inside wire)
      ctx.fillStyle = `rgba(167,139,250,${alpha})`;
      ctx.beginPath();
      ctx.arc(pulse.x, 150, size, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;

    // highlight delivery
    if(pulse.x > 780 && pulse.x < 820){
      ctx.shadowBlur = 40;
      ctx.shadowColor = "#facc15";
      ctx.fillStyle = "rgba(250,204,21,0.6)";
      ctx.beginPath();
      ctx.arc(800,150,20+10*energyScale,0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    if(pulse.life <= 0 || pulse.x > 820 || pulse.x < 80){
      pulses.splice(i,1);
    }
  }
}

angle+=P/(load*50);
drawWheel(angle);

if(physicsMode) drawPhysics(dir, P);

document.getElementById('info').innerText=
"Voltage:"+V.toFixed(2)+" Current:"+I.toFixed(2)+" Power:"+P.toFixed(2);
}

drawGraph();
requestAnimationFrame(update);
}

let angle=0;

setActive('acBtn', false);
setActive('pauseBtn', false);
setActive('physicsBtn', false);
setActive('pulseBtn', false);

update();
</script>
</body>
</html>
